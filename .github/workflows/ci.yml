name: CI

on:
  push:
    branches: [main]
  # Run on every PR regardless of base branch so stacked PRs (whose base
  # is a sibling feat/* branch, not main) still gate on CI before merge.
  pull_request:
  # Required by the GitHub merge queue (enabled 2026-07-16): queued PRs
  # trigger CI via merge_group, not pull_request -- without this event
  # every queued PR stalls with no checks reporting. See #814.
  merge_group:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --all-targets -- -D warnings

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - run: shellcheck install.sh plugin/bin/legion plugin/hooks/*.sh plugin/hooks/lib/*.sh plugin/hooks/tests/*.sh scripts/*.sh .githooks/pre-commit .githooks/pre-push

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      # Windows runner image sometimes leaves rustup-init.exe in PATH
      # ahead of cargo, so `cargo test` parses as `rustup-init test` and
      # fails before the suite runs. Forcing the default toolchain on
      # Windows only -- the dtolnay action may install rustc without
      # rustup on macOS, where this step would fail with command-not-found.
      - if: runner.os == 'Windows'
        run: rustup default stable
        shell: bash
      - uses: Swatinem/rust-cache@v2
      - run: cargo test
